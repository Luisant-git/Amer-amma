<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Amer Amma</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FBBF24',
            primaryHover: '#F59E0B',
            secondary: '#0F172A',
            footer: '#020617',
            accent: '#EF4444',
            accentHover: '#DC2626',
            surface: '#F8FAFC',
          },
          boxShadow: {
            'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
            'glow': '0 0 20px rgba(251, 191, 36, 0.3)',
          },
          animation: {
            'marquee': 'marquee 25s linear infinite',
          },
          keyframes: {
            marquee: {
              '0%': { transform: 'translateX(0%)' },
              '100%': { transform: 'translateX(-100%)' },
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-surface text-slate-800">
  
  <!-- Header Component -->
  <div id="header"></div>

  <!-- Products Hero -->
  <section class="relative pt-20">
    <div class="h-[400px] relative w-full overflow-hidden flex items-center justify-center">
      <!-- Background Image (Front Grille of trucks) -->
      <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="AMMA Products" class="absolute inset-0 w-full h-full object-cover">
      <!-- Dark Overlay -->
      <div class="absolute inset-0 bg-secondary/80 mix-blend-multiply"></div>
      
      <!-- Content -->
      <div class="relative z-10 text-center px-6">
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-white uppercase tracking-wider">
          Products
        </h1>
      </div>
    </div>
    
    <!-- Breadcrumb Bar -->
    <div class="bg-white border-b border-slate-100 py-4 shadow-sm relative z-20">
      <div class="container mx-auto px-6 max-w-7xl flex flex-col sm:flex-row justify-between items-center gap-4">
        <div class="text-sm text-slate-500">
          <a href="index.html" class="hover:text-primary transition-colors">Home</a>
          <span class="mx-2">></span>
          <span class="text-primary font-medium">Products</span>
        </div>
        
        <div class="group flex flex-row-reverse items-center gap-4 text-slate-400 text-sm">
          <div class="flex items-center gap-2 text-slate-600 font-medium cursor-pointer group-hover:text-primary transition-colors">
            <i class="fa-solid fa-share-nodes"></i> Share
          </div>
          <div class="flex items-center gap-2 opacity-0 translate-x-4 group-hover:translate-x-0 group-hover:opacity-100 transition-all duration-500 pointer-events-none group-hover:pointer-events-auto">
            <a href="#" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center hover:bg-primary hover:text-white transition-colors"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center hover:bg-primary hover:text-white transition-colors"><i class="fa-brands fa-twitter"></i></a>
            <a href="#" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center hover:bg-primary hover:text-white transition-colors"><i class="fa-brands fa-google-plus-g"></i></a>
            <a href="#" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center hover:bg-primary hover:text-white transition-colors"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Products Main Content -->
  <section class="pt-12 pb-10 bg-white">
    <div class="container mx-auto px-6 max-w-7xl">
      <div class="mb-8">
        <h2 class="text-3xl md:text-4xl font-extrabold text-secondary tracking-tight">Products</h2>
        <div class="w-12 h-1 bg-primary mt-3 rounded-full"></div>
      </div>
      
      <!-- Product Grid -->
      <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Dynamic content loaded via JS -->
      </div>
    </div>
  </section>

  <!-- Partners Component (Dynamic Loader) -->
  <div id="partners"></div>

  <!-- Footer Component (Dynamic Loader) -->
  <div id="footer"></div>

  <!-- Dynamic Component Loader -->
  <script>
    // Product Catalog Data Array (100% dynamic loading)
    const productsData = [
      {
        title: "Lowbed Semi Trailer (Yellow)",
        image: "images/products/100090077_267999437721408_2988943934006231040_o.jpg",
        url: "#"
      },
      {
        title: "Lowbed Semi Trailer (Blue)",
        image: "images/products/100771825_267999361054749_7313798073468059648_o.jpg",
        url: "#"
      },
      {
        title: "Bulkers (Tanker)",
        image: "images/products/98348185_267999367721415_3299011409949491200_o.jpg",
        url: "#"
      },
      {
        title: "Cargo Bodies (Box Truck)",
        image: "images/products/103333252_284812619373423_243043752155131057_n.jpg",
        url: "#"
      },
      {
        title: "Recovery Trucks",
        image: "images/products/103424940_284812349373450_7634032767353645575_n.jpg",
        url: "#"
      },
      {
        title: "Flatbed Semi Trailer",
        image: "images/products/FLATBED SEMI TRAILER.jpeg",
        url: "#"
      },
      {
        title: "Heavy Tipper Trailer",
        image: "images/products/Tip-02.JPG",
        url: "#"
      },
      {
        title: "Vacuum Tanker",
        image: "images/products/vaccum.JPG",
        url: "#"
      },
      {
        title: "Lowbed Heavy Trailer",
        image: "images/products/lower-bed-01.jpg",
        url: "#"
      },
      {
        title: "High-Capacity Tipper",
        image: "images/products/Tip-03.JPG",
        url: "#"
      },
      {
        title: "Cement Bulker Carrier",
        image: "images/products/image00006.jpeg",
        url: "#"
      },
      {
        title: "Container Carrier Trailer",
        image: "images/products/1616481020725.jpg",
        url: "#"
      }
    ];

    async function loadComponent(id, file) {
      try {
        const response = await fetch(file);
        if (!response.ok) throw new Error('Network response was not ok');
        const text = await response.text();
        document.getElementById(id).innerHTML = text;
      } catch (error) {
        console.error(`Error loading component ${file}:`, error);
      }
    }

    // Initialize components & Render Cards
    async function init() {
      await loadComponent('header', 'components/header.html');
      await loadComponent('partners', 'components/partners.html');
      await loadComponent('footer', 'components/footer.html');
      
      // Render Products dynamically
      const productsGrid = document.getElementById('products-grid');
      if (productsGrid) {
        productsGrid.innerHTML = productsData.map(product => `
          <div class="bg-white rounded-3xl overflow-hidden border border-slate-100 hover:shadow-soft hover:-translate-y-1.5 transition-all duration-300 group">
            <div class="h-64 overflow-hidden relative bg-slate-100">
              <img src="${product.image}" alt="${product.title}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500" loading="lazy">
            </div>
            <div class="p-8">
              <h3 class="font-bold text-xl text-secondary mb-4 group-hover:text-primary transition-colors">${product.title}</h3>
              <a href="${product.url}" class="inline-flex items-center font-semibold text-primary hover:text-primaryHover transition-colors w-max group/link">
                Read More <i class="fa-solid fa-arrow-right ml-2 transform group-hover/link:translate-x-1 transition-transform"></i>
              </a>
            </div>
          </div>
        `).join('');
      }

      // Update active state in nav (optional script logic)
      setTimeout(() => {
        const navLinks = document.querySelectorAll('header nav a');
        navLinks.forEach(link => {
          if (link.textContent.trim() === 'Products') {
            link.classList.remove('text-slate-300');
            link.classList.add('text-primary');
          } else if (link.textContent.trim() === 'Home') {
            link.classList.remove('text-primary');
            link.classList.add('text-slate-300');
          }
        });
      }, 500); // small delay to ensure header is loaded
    }

    init();
  </script>
</body>
</html>
