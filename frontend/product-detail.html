    // Component Loader Function with Local Storage Caching
    async function loadComponent(id, file) {
      try {
        const cacheKey = `comp_${id}`;
        const cachedHtml = localStorage.getItem(cacheKey);
        
        // 1. Render from cache instantly if available
        if (cachedHtml) {
          document.getElementById(id).innerHTML = cachedHtml;
        }

        // 2. Fetch fresh content over network
        const response = await fetch(file);
        if (!response.ok) throw new Error('Network response was not ok');
        const text = await response.text();
        
        // 3. Update DOM and cache only if content has changed (prevents screen flashes)
        if (text !== cachedHtml) {
          document.getElementById(id).innerHTML = text;
          localStorage.setItem(cacheKey, text);
        }
      } catch (error) {
        console.error(`Error loading component ${file}:`, error);
      }
    }

    // Scroll-to-top show/hide logic

      if (window.scrollY > 300) {
        btn.classList.remove('scale-0');
        btn.classList.add('scale-100');
      } else {
        btn.classList.remove('scale-100');
        btn.classList.add('scale-0');
      }
    });

        document.getElementById('banner-title').textContent = product.title;
        document.getElementById('banner-title').classList.remove('uppercase');
        document.getElementById('banner-subtitle').textContent = `Category: ${product.category}`;
        
        // Update breadcrumb
        const parentLink = document.getElementById('breadcrumb-parent-link');
        if (product.category === "Special Products") {
          parentLink.href = "special-products.html";
          parentLink.textContent = "Special Products";
        } else {
          parentLink.href = "products.html";
          parentLink.textContent = "Products";
        }
        document.getElementById('breadcrumb-child-title').textContent = product.title;

        // Populate elements
        document.getElementById('product-image').src = product.image;
        document.getElementById('product-image').alt = product.title;
        document.getElementById('product-category').textContent = product.category;


        // Find sibling keys for Prev / Next links
        const keys = Object.keys(productsDb);
        const index = keys.indexOf(productId);
        
        const prevKey = index > 0 ? keys[index - 1] : keys[keys.length - 1];
        const nextKey = index < keys.length - 1 ? keys[index + 1] : keys[0];

        document.getElementById('prev-product-link').href = `product-detail.html?id=${prevKey}`;
        document.getElementById('next-product-link').href = `product-detail.html?id=${nextKey}`;
      } else {
        // Redirection fallback
        window.location.href = "products.html";
      }
    }

    // Initialize Page
    async function init() {
      await loadComponent('header', 'components/header.html');
      await loadComponent('footer', 'components/footer.html');
      
      // Highlight nav item matching the category immediately (no delay needed because header has been awaited!)
      const params = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const product = productsDb[productId];
      const activeNavName = (product && product.category === "Special Products") ? "Special Products" : "Products";
      
      const navLinks = document.querySelectorAll('header nav a');
      navLinks.forEach(link => {
        if (link.textContent.trim() === activeNavName) {
          link.classList.remove('text-slate-300');
          link.classList.add('text-primary');
        } else if (link.textContent.trim() === 'Home') {
          link.classList.remove('text-primary');
          link.classList.add('text-slate-300');
        }
      });

      renderProduct();
    }

    window.addEventListener('popstate', renderProduct);

    init();
  </script>
</body>
</html>
