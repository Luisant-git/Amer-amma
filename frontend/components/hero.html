<!-- Hero Section -->
<section class="relative h-[80vh] min-h-[600px] flex items-center justify-center overflow-hidden" id="hero-carousel">
  
  <!-- Slides Container -->
  <div class="absolute inset-0 z-0">
    <!-- Slide 1 -->
    <div class="slide absolute inset-0 transition-opacity duration-1000 opacity-100 active">
      <img src="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Hero Background 1" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-r from-secondary/90 via-secondary/70 to-transparent"></div>
    </div>
    <!-- Slide 2 -->
    <div class="slide absolute inset-0 transition-opacity duration-1000 opacity-0">
      <img src="https://images.unsplash.com/photo-1519003722824-194d4455a60c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Hero Background 2" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-r from-secondary/90 via-secondary/70 to-transparent"></div>
    </div>
    <!-- Slide 3 -->
    <div class="slide absolute inset-0 transition-opacity duration-1000 opacity-0">
      <img src="https://images.unsplash.com/photo-1591768793355-74d04bb6608f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Hero Background 3" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-r from-secondary/90 via-secondary/70 to-transparent"></div>
    </div>
  </div>
  
  <!-- Hero Content (Overlay over slides) -->
  <div class="container mx-auto px-6 relative z-10 pt-20">
    <div class="max-w-3xl ml-4 md:ml-16 lg:ml-32">
      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 backdrop-blur-sm border border-white/20 text-white text-sm font-medium mb-6">
        <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
        Premium Manufacturing
      </div>
      <h1 class="text-5xl md:text-7xl font-bold text-white mb-6 leading-tight tracking-tight transition-all">
        Heavy <span class="text-primary">Fabrication</span> & Body Building
      </h1>
      <p class="text-lg md:text-xl text-slate-300 mb-10 max-w-2xl leading-relaxed">
        Industry-leading solutions for Water Tankers, Fuel Tankers, and specialized trailers engineered for extreme durability.
      </p>
      <div class="flex flex-wrap gap-4">
        <a href="#" class="px-8 py-4 bg-primary hover:bg-primaryHover text-secondary font-bold rounded-full transition-all duration-300 transform hover:-translate-y-1 shadow-glow flex items-center gap-2">
          Explore Products <i class="fa-solid fa-arrow-right"></i>
        </a>
        <a href="#" class="px-8 py-4 bg-white/10 hover:bg-white/20 backdrop-blur-md text-white font-bold rounded-full transition-all duration-300 border border-white/20 flex items-center gap-2">
          Contact Us
        </a>
      </div>
    </div>
  </div>

  <!-- Carousel Controls -->
  <button onclick="prevSlide()" class="absolute left-4 md:left-10 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/30 backdrop-blur-md border border-white/20 text-white flex items-center justify-center z-20 transition-all shadow-lg hidden md:flex">
    <i class="fa-solid fa-chevron-left"></i>
  </button>
  <button onclick="nextSlide()" class="absolute right-4 md:right-10 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-white/10 hover:bg-white/30 backdrop-blur-md border border-white/20 text-white flex items-center justify-center z-20 transition-all shadow-lg hidden md:flex">
    <i class="fa-solid fa-chevron-right"></i>
  </button>

  <!-- Carousel Indicators -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-3 z-20">
    <button onclick="goToSlide(0)" class="indicator w-8 h-2.5 rounded-full bg-primary transition-all duration-300"></button>
    <button onclick="goToSlide(1)" class="indicator w-2.5 h-2.5 rounded-full bg-white/50 hover:bg-white/80 transition-all duration-300"></button>
    <button onclick="goToSlide(2)" class="indicator w-2.5 h-2.5 rounded-full bg-white/50 hover:bg-white/80 transition-all duration-300"></button>
  </div>
</section>
